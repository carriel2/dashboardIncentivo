services:
  worker:
    build: .
    container_name: billing_worker
    command: python -u scheduler.py
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo

  grafana:
    image: grafana/grafana-oss:latest
    container_name: billing_grafana
    ports:
      - "3000:3000"
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  grafana_data:   