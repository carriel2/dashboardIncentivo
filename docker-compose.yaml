version: '3.8'

services:
  dashboard:
    build: .
    container_name: billing_dashboard
    command: streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "80:8501"
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo

  worker:
    build: .
    container_name: billing_worker
    command: python -u scheduler.py
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo

volumes:
  sqlite_data: